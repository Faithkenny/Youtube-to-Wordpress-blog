<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post Published Successfully</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        .success-icon {
            text-align: center;
            font-size: 80px;
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .post-details {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .detail-item {
            margin-bottom: 15px;
        }

        .detail-item:last-child {
            margin-bottom: 0;
        }

        .detail-label {
            font-weight: 600;
            color: #333;
            font-size: 13px;
            margin-bottom: 5px;
        }

        .detail-value {
            color: #666;
            font-size: 14px;
            word-break: break-word;
        }

        .detail-value a {
            color: #667eea;
            text-decoration: none;
        }

        .detail-value a:hover {
            text-decoration: underline;
        }

        .summary-section {
            margin-bottom: 25px;
        }

        .summary-title {
            font-weight: 600;
            color: #333;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .summary-content {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            color: #666;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .actions {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .primary-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .primary-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .secondary-button {
            background: #e0e0e0;
            color: #333;
        }

        .secondary-button:hover {
            background: #d0d0d0;
        }

        button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">🎉</div>
        <h1>Blog Post Published!</h1>
        <p class="subtitle">Your blog post has been successfully created and published as a draft</p>

        <div class="post-details">
            <div class="detail-item">
                <div class="detail-label">Post ID</div>
                <div class="detail-value">{{ post_id }}</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">Title</div>
                <div class="detail-value">{{ title }}</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">Draft URL</div>
                <div class="detail-value">
                    <a href="{{ draft_url }}" target="_blank">{{ draft_url }}</a>
                </div>
            </div>
            <div class="detail-item">
                <div class="detail-label">Post Link</div>
                <div class="detail-value">
                    <a href="{{ link }}" target="_blank">{{ link }}</a>
                </div>
            </div>
        </div>

        <div class="summary-section">
            <div class="summary-title">Summary</div>
            <div class="summary-content">{{ summary }}</div>
        </div>

        <div class="actions">
            <a href="{{ draft_url }}" target="_blank" class="primary-button" style="text-decoration: none; display: block; text-align: center;">View Draft</a>
            <a href="/" class="secondary-button" style="text-decoration: none; display: block; text-align: center;">Create Another</a>
        </div>
    </div>
</body>
</html>
